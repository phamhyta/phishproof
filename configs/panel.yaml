# PhishProof panel — FULL LOCAL + GPT-4o spot-check (decision 0b).
# Three deliberately diverse evidence agents from different model families, reached
# through Ollama's OpenAI-compatible endpoint. Diversity is the design variable
# (RQ3), so the two text agents are from different pretraining families and one
# agent is a VLM that reads the screenshot.
#
# Models are 3B-class to fit a 16 GB Mac (3x7B can't stay resident -> constant reload).
# Combined with the batch-by-agent runner (one model loaded at a time, swept over all
# pages), this keeps the run tractable. Prereq:
#   ollama pull llama3.2:3b qwen2.5:3b qwen2.5vl:3b

panel:
  - id: agent_a_text          # Meta family
    provider: ollama
    model: llama3.2:3b
    modality: text
    base_url: http://localhost:11434/v1
    temperature: 0.0
    num_ctx: 8192

  - id: agent_b_text          # Alibaba family (cross-family diversity)
    provider: ollama
    model: qwen2.5:3b
    modality: text
    base_url: http://localhost:11434/v1
    temperature: 0.0
    num_ctx: 8192

  - id: agent_c_vision        # VLM reads the screenshot — GPT-4o API (fast + strong;
    provider: openai          # local 3B vision was the throughput bottleneck on 16 GB)
    model: gpt-4o
    modality: vision
    base_url: null            # uses OPENAI_API_KEY
    detail: low               # downscaled screenshot -> cheap (~85 image tokens)
    temperature: 0.0

# ~150 pages re-run on GPT-4o to validate local cue quality vs the API ceiling.
# If local-vs-GPT4o agreement < threshold, switch agent_c_vision to a GPT-4o
# fallback with detail:"low" (cheap) for the pages that need it.
spot_check:
  enabled: true
  provider: openai
  model: gpt-4o
  n_pages: 150
  agreement_threshold: 0.80
