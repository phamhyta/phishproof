# Cách A stress-test: a WEAK all-local 3B panel (incl. a local 3B VLM) that hallucinates
# more than the GPT-4o-vision default, to test whether grounding catches shared
# hallucinations (high agreement on cues the page does not carry). Prereq:
#   ollama pull llama3.2:3b qwen2.5:3b qwen2.5vl:3b

panel:
  - id: agent_a_text
    provider: ollama
    model: llama3.2:3b
    modality: text
    base_url: http://localhost:11434/v1
    temperature: 0.0
    num_ctx: 8192

  - id: agent_b_text
    provider: ollama
    model: qwen2.5:3b
    modality: text
    base_url: http://localhost:11434/v1
    temperature: 0.0
    num_ctx: 8192

  - id: agent_c_vision
    provider: ollama
    model: qwen2.5vl:3b
    modality: vision
    base_url: http://localhost:11434/v1
    temperature: 0.0
    num_ctx: 8192

spot_check:
  enabled: false
  provider: openai
  model: gpt-4o
  n_pages: 0
