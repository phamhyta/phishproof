# Experiment-level settings (see experiments.tex).
# Start with a 200-page pilot to measure real token/time, then scale n_pages to 4000.

n_pages: 4000
calibration_frac: 0.15        # small labeled calibration split; rest is held-out test
seeds: [0, 1]                 # 2 seeds; CI comes from paired bootstrap over pages
target_selective_risk: 0.01   # Cov99 operating point (99% selective accuracy)
coverage_points: [0.80]       # SelAcc80 / FPR80 operating point

data_dir: data/phishsel
cache_dir: data/cache
results_dir: results
