name: reproducibility

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  regenerate-tables:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (CPU, no model deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e . || pip install numpy scikit-learn pydantic tldextract pyyaml beautifulsoup4

      - name: Run reproducibility smoke
        env:
          PYTHON: python
        run: ./scripts/test_reproducibility.sh

      - name: Upload regenerated tables log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tables-log
          path: /tmp/phishproof_tables.log
